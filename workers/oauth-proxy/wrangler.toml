name = "blog-oauth-proxy"
main = "worker.ts"
compatibility_date = "2026-03-02"

[vars]
# Allowed origins for CORS (comma-separated).
# Example:
# ALLOWED_ORIGINS = "https://ymw0407.github.io,http://localhost:5173"
ALLOWED_ORIGINS = "https://ymw0407.github.io"

# Optional: lock proxy usage to a known GitHub OAuth App client id.
# Example:
# ALLOWED_CLIENT_IDS = "Iv1.1234567890abcdef"
ALLOWED_CLIENT_IDS = "Iv23liNPffT708bNpFMD"

# Optional. Set this as a secret:
#   wrangler secret put GITHUB_CLIENT_SECRET
# GITHUB_CLIENT_SECRET = ""
