<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="blob1" cx="28%" cy="36%" r="78%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.46"/>
      <stop offset="0.55" stop-color="#22c55e" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="70%" cy="65%" r="78%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.36"/>
      <stop offset="0.6" stop-color="#fb7185" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <circle cx="360" cy="300" r="340" fill="url(#blob1)" filter="url(#soft)"/>
  <circle cx="860" cy="500" r="320" fill="url(#blob2)" filter="url(#soft)"/>
  <g fill="#ffffff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" text-anchor="middle">
    <text x="600" y="360" font-size="56" font-weight="760" opacity="0.95">Writing Workflow</text>
    <text x="600" y="412" font-size="18" font-weight="540" opacity="0.72">Example thumbnail</text>
  </g>
</svg>
