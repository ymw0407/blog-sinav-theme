<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="blob" cx="30%" cy="30%" r="75%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#fb7185" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <circle cx="360" cy="260" r="320" fill="url(#blob)" filter="url(#soft)"/>
  <circle cx="860" cy="520" r="280" fill="url(#blob)" filter="url(#soft)" opacity="0.7"/>
  <g fill="#ffffff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" text-anchor="middle">
    <text x="600" y="360" font-size="56" font-weight="760" opacity="0.95">Coffee Notes</text>
    <text x="600" y="412" font-size="18" font-weight="540" opacity="0.72">Example thumbnail</text>
  </g>
</svg>
