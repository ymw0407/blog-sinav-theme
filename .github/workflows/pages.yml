name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  repository_dispatch:
    types: [content-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (blog-web)
        uses: actions/checkout@v4

      - name: Checkout (blog-content)
        uses: actions/checkout@v4
        if: ${{ vars.CONTENT_REPO != '' }}
        with:
          repository: ${{ vars.CONTENT_REPO }}
          path: content
          # If CONTENT_REPO_TOKEN isn't set, fall back to github.token.
          # This works for public repos; private repos still require a PAT/App token.
          token: ${{ secrets.CONTENT_REPO_TOKEN || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Index content
        env:
          VITE_CONTENT_REPO_OWNER: ${{ vars.VITE_CONTENT_REPO_OWNER }}
          VITE_CONTENT_REPO_NAME: ${{ vars.VITE_CONTENT_REPO_NAME }}
          # Used by scripts/index-content.mjs to index comments via the GitHub API.
          GITHUB_TOKEN: ${{ secrets.CONTENT_REPO_TOKEN || github.token }}
        run: pnpm run index-content

      - name: Build
        env:
          # Prefer repo variables (custom domains, non-standard paths), fall back to GitHub Pages defaults.
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH != '' && vars.VITE_BASE_PATH || (endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name)) }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL != '' && vars.VITE_SITE_URL || (endsWith(github.event.repository.name, '.github.io') && format('https://{0}.github.io/', github.repository_owner) || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name)) }}
          VITE_ASSET_VERSION: ${{ github.sha }}
          # Expose Vite envs at build-time (set these in Repo A settings: Variables).
          VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_GITHUB_CLIENT_ID }}
          VITE_GITHUB_REDIRECT_URI: ${{ vars.VITE_GITHUB_REDIRECT_URI }}
          VITE_OAUTH_PROXY_URL: ${{ vars.VITE_OAUTH_PROXY_URL }}
          VITE_CONTENT_REPO_OWNER: ${{ vars.VITE_CONTENT_REPO_OWNER }}
          VITE_CONTENT_REPO_NAME: ${{ vars.VITE_CONTENT_REPO_NAME }}
          VITE_ALLOWED_USERS: ${{ vars.VITE_ALLOWED_USERS }}
        run: pnpm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
